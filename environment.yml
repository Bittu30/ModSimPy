name: ModSimPy
channels:
  - conda-forge
dependencies:
  # Core dependencies for users
  - python=3.13
  - jupyter
  - numpy
  - matplotlib
  - pandas
  - scipy
  - pint
  - sympy
  - lxml
  - html5lib
  - beautifulsoup4
  - pytables
  - pip

# For development dependencies, use environment-dev.yml
# Install with: mamba env create -f environment-dev.yml
